name: nix build

on:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'default.nix'
      - 'flake.nix'
      - 'flake.lock'
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'default.nix'
      - 'flake.nix'
      - 'flake.lock'
  workflow_dispatch:

jobs:
  nix-build:
    name: nix build .#default
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@bafaa638b9d5ec0e7e3ac1a7fc80453ef1fd265f # v3
      - name: Build
        run: nix build .#default --print-build-logs
